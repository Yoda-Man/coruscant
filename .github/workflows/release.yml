name: Build and Release

# Runs automatically when you push a version tag (e.g. git tag v0.9.0 && git push --tags)
# Can also be triggered manually from the GitHub Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest


  build-windows:
    name: Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller distribution/coruscant.spec --distpath distribution/dist --workpath distribution/.build --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coruscant-Windows
          path: distribution/dist/Coruscant.exe


  build-macos:
    name: macOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt
          pip3 install pyinstaller

      - name: Build
        run: python3 -m PyInstaller distribution/coruscant.spec --distpath distribution/dist --workpath distribution/.build --noconfirm

      - name: Zip .app bundle
        run: cd distribution/dist && zip -r Coruscant-macOS.zip Coruscant.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coruscant-macOS
          path: distribution/dist/Coruscant-macOS.zip


  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0 libdbus-1-3

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt
          pip3 install pyinstaller

      - name: Build
        run: python3 -m PyInstaller distribution/coruscant.spec --distpath distribution/dist --workpath distribution/.build --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coruscant-Linux
          path: distribution/dist/Coruscant


  # Creates a GitHub Release with all three files attached when triggered by a tag push
  release:
    name: Publish Release
    needs: [test, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Coruscant ${{ github.ref_name }}
          body: |
            ## Coruscant ${{ github.ref_name }}

            Download the file for your platform below.

            | Platform | File |
            |---|---|
            | Windows | `Coruscant.exe` |
            | macOS | `Coruscant-macOS.zip` — unzip and move to Applications |
            | Linux | `Coruscant` — run `chmod +x Coruscant` then `./Coruscant` |

            **Requirements:** A running PostgreSQL server (9.x to 16+). No Python installation needed.
          files: |
            release-files/Coruscant.exe
            release-files/Coruscant-macOS.zip
            release-files/Coruscant
